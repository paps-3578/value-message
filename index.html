<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cute Doll Background</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f9f9f9;
            position: relative;
        }
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.1;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle fill="peach" cx="50" cy="50" r="40"/><path fill="mauve" d="M35 70 Q50 85, 65 70 T95 70 Q80 50, 50 50 Q20 50, 35 70"/></svg>');
            background-size: cover;
        }
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
        }
        h1 {
            font-family: Arial, sans-serif;
            color: #333;
        }
        p {
            font-family: Arial, sans-serif;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="content">
        <h1>Welcome to the Cute Doll Page!</h1>
        <p>This is a lovely place filled with cute dolls. Enjoy your stay!</p>
    </div>
</body>
</html>
