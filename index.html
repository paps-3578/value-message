<!DOCTYPE html>

<body>

    <!-- Soft petal/particle drifts -->

        <span></span><span></span><span></span>

    <div class="container">

        <div class="doll-wrap" aria-hidden="true">
            <svg class="doll" viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg" fill="none">

                <circle cx="53.5" cy="39" r="1.2" fill="#fff"/>
                <circle cx="69.5" cy="39" r="1.2" fill="#fff"/>

                <path d="M54 54 Q60 60 66 54" stroke="#b07060" stroke-width="1.8" stroke-linecap="round" fill="none"/>

                <path d="M48 128 Q45 145 44 158" stroke="#f5e6d8" stroke-width="9" stroke-linecap="round" fill="none"/>

            </svg>
        </div>

        <!-- Message box -->
        <div class="message-box">
            <div class="messages">
                <h1 class="msg msg-1">You are deeply valued.</h1>
                <p class="msg msg-2">You are quietly loved.</p>
                <p class="msg msg-3">Exactly as you are.</p>
            </div>
            <div class="divider" aria-hidden="true">
                <span>✦</span><span>✦</span><span>✦</span>
            </div>
        </div>

    </div>

</body>
</html>
