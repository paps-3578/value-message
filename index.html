<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You are valued</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Importing fonts from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>
    <!-- Cute Doll Background Element -->
    <svg class="doll-background" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
        <!-- Head -->
        <circle cx="100" cy="60" r="35" fill="#d4a574" />
        
        <!-- Face details -->
        <circle cx="90" cy="50" r="5" fill="#333" /> <!-- Left eye -->
        <circle cx="110" cy="50" r="5" fill="#333" /> <!-- Right eye -->
        <circle cx="90" cy="52" r="2" fill="#fff" /> <!-- Left eye shine -->
        <circle cx="110" cy="52" r="2" fill="#fff" /> <!-- Right eye shine -->
        
        <!-- Mouth -->
        <path d="M 95 65 Q 100 70 105 65" stroke="#c08860" stroke-width="2" fill="none" stroke-linecap="round" />
        
        <!-- Rosy cheeks -->
        <circle cx="75" cy="60" r="8" fill="#e8a89a" opacity="0.6" />
        <circle cx="125" cy="60" r="8" fill="#e8a89a" opacity="0.6" />
        
        <!-- Body - Dress -->
        <path d="M 70 95 Q 65 140 75 180 L 125 180 Q 135 140 130 95 Z" fill="#b8956a" />
        
        <!-- Dress pattern -->
        <circle cx="90" cy="120" r="4" fill="#d4a574" opacity="0.5" />
        <circle cx="110" cy="120" r="4" fill="#d4a574" opacity="0.5" />
        <circle cx="100" cy="140" r="4" fill="#d4a574" opacity="0.5" />
        <circle cx="85" cy="160" r="4" fill="#d4a574" opacity="0.5" />
        <circle cx="115" cy="160" r="4" fill="#d4a574" opacity="0.5" />
        
        <!-- Arms -->
        <rect x="50" y="100" width="20" height="60" rx="10" fill="#d4a574" />
        <rect x="130" y="100" width="20" height="60" rx="10" fill="#d4a574" />
        
        <!-- Legs -->
        <rect x="80" y="180" width="15" height="80" rx="7" fill="#d4a574" />
        <rect x="105" y="180" width="15" height="80" rx="7" fill="#d4a574" />
        
        <!-- Shoes -->
        <ellipse cx="87.5" cy="270" rx="10" ry="8" fill="#8b6d5c" />
        <ellipse cx="112.5" cy="270" rx="10" ry="8" fill="#8b6d5c" />
    </svg>

    <div class="container">
        <h1 class="heading">You are deeeply valued.</h1>
        <p class="body-text">You are quitely loved.</p> 
        <p class="body-text">Exactly as you are.</p>
    </div>
</body>
</html>
